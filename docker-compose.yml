services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      network: host
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-}
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-}
      NODE_ENV: production
      TZ: ${TZ:-Asia/Shanghai}
      FRONTEND_LOG_ROOT: /logs
    volumes:
      - ./logs:/logs
    depends_on:
      backend-api:
        condition: service_started
    restart: unless-stopped

  backend-api:
    build:
      context: ./backend
      dockerfile: Dockerfile.api
      network: host
    env_file:
      - .env.docker
    environment:
      BACKEND_MODE: api
    volumes:
      - ./backend/app:/app/app
      - ./data:/data
      - ./backend/weights:/app/weights
      - ./logs:/logs
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
      monitor-worker:
        condition: service_started
      monitor-worker-1:
        condition: service_started
      monitor-worker-2:
        condition: service_started
      monitor-worker-3:
        condition: service_started
    restart: unless-stopped

  monitor-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
      network: host
    env_file:
      - .env.docker
    environment:
      BACKEND_MODE: worker
      LD_LIBRARY_PATH: /opt/hikvision-sdk
      CAMERA_MONITOR_SHARD_INDEX: 0
      CAMERA_MONITOR_SHARD_COUNT: ${CAMERA_MONITOR_SHARD_COUNT:-4}
      CAMERA_RUNTIME_SHARED_SUBMIT_THREADS: ${CAMERA_RUNTIME_SHARED_SUBMIT_THREADS:-4}
      CAMERA_RUNTIME_SHARED_DISPATCH_THREADS: ${CAMERA_RUNTIME_SHARED_DISPATCH_THREADS:-4}
      CAMERA_RUNTIME_LATEST_ONLY_MODE: ${CAMERA_RUNTIME_LATEST_ONLY_MODE:-true}
      CAMERA_RUNTIME_MAX_MAILBOX_FRAMES: ${CAMERA_RUNTIME_MAX_MAILBOX_FRAMES:-1}
      BROKER_PUBLISH_TIMEOUT_SECONDS: ${BROKER_PUBLISH_TIMEOUT_SECONDS:-2}
      INFERENCE_MAX_PENDING_FRAMES_PER_CAMERA: ${INFERENCE_MAX_PENDING_FRAMES_PER_CAMERA:-1}
      IDENTITY_MAX_PENDING_FRAMES_PER_CAMERA: ${IDENTITY_MAX_PENDING_FRAMES_PER_CAMERA:-2}
      IDENTITY_PENDING_TIMEOUT_SECONDS: ${IDENTITY_PENDING_TIMEOUT_SECONDS:-30}
      CAMERA_RUNTIME_PROCESS_QUEUE_SIZE: ${CAMERA_RUNTIME_PROCESS_QUEUE_SIZE:-4}
    volumes:
      - ./backend/app:/app/app
      - ./data:/data
      - ./backend/weights:/app/weights
      - ./HCNetSDKV6.1.11.5_build20251204_linux64_ZH/库文件:/opt/hikvision-sdk
      - ./logs:/logs
      - ./shared-frames:/shared-frames
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

