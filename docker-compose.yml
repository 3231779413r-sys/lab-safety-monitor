      IDENTITY_QUEUE_PREFETCH: ${IDENTITY_QUEUE_PREFETCH:-8}
      IDENTITY_WORKER_EXECUTOR_WORKERS: ${IDENTITY_WORKER_EXECUTOR_WORKERS:-1}
      IDENTITY_USE_PERSON_CROPS_FIRST: ${IDENTITY_USE_PERSON_CROPS_FIRST:-true}
      IDENTITY_MAX_CROPS_PER_FRAME: ${IDENTITY_MAX_CROPS_PER_FRAME:-2}
